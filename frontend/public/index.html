<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#26252D">
  <title>NeoChef PWA</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #26252D; 
      color: #EAE6CA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 20px; }
    h1 { margin-bottom: 20px; font-size: 2em; }
    p { margin-bottom: 30px; opacity: 0.8; }
    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: #EAE6CA;
      color: #26252D;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1em;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(234,230,202,0.3); }
    .auto-redirect { font-size: 0.9em; margin-top: 20px; opacity: 0.6; }
  </style>
  <script>
    // Redirection automatique après 2 secondes
    setTimeout(function() {
      window.location.href = 'https://017b3938-5597-48e9-b176-182bc317a58f.preview.emergentagent.com';
    }, 2000);
  </script>
</head>
<body>
  <div class="container">
    <h1>🍽️ NeoChef PWA</h1>
    <p>Vous allez être redirigé vers l'application...</p>
    <a href="https://017b3938-5597-48e9-b176-182bc317a58f.preview.emergentagent.com" class="btn">
      Accéder à NeoChef
    </a>
    <p class="auto-redirect">Redirection automatique dans 2 secondes...</p>
  </div>
</body>
</html>
